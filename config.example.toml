[upstream]
base_url = "http://127.0.0.1:8000/v1"
api_key = "<dummy>"
model = "<your model name>"
thinking_param_style = "chat_template_kwargs"

[agent]
public_model_id = "qwen-agent"
max_tool_retries = 2
log_requests = true
log_upstream = true

[planner]
enable_thinking = true
temperature = 0.2
max_tokens = 4096

[tool_caller]
enable_thinking = false
temperature = 0.0
max_tokens = 2048

[finalizer]
enable_thinking = true
temperature = 0.3
max_tokens = 8192
